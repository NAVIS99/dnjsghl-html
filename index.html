<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K Auction 회원가입 핸드오프</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <link rel="stylesheet" href="kads-foundation.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: var(--surface-gray-lighter2); color: var(--text-default); -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 40rem; margin: 0 auto; padding: 3rem 1.5rem; }
    .title { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.012rem; margin-bottom: 0.375rem; }
    .sub   { font-size: 0.9375rem; color: var(--text-secondary); letter-spacing: -0.0075rem; margin-bottom: 2.5rem; }
    .list  { display: flex; flex-direction: column; gap: 0.75rem; }
    .item  { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; background: var(--surface-white); border-radius: 0.5rem; border: 1px solid var(--border-gray-light); text-decoration: none; color: inherit; transition: border-color 0.1s, box-shadow 0.1s; }
    .item:hover { border-color: var(--border-gray-dark1); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .item-left { display: flex; align-items: center; gap: 1rem; }
    .item-num  { width: 2rem; height: 2rem; border-radius: 50%; background: var(--surface-default); color: var(--text-white); display: flex; align-items: center; justify-content: center; font-size: 0.875rem; font-weight: 600; flex-shrink: 0; }
    .item-num.done { background: var(--surface-primary); }
    .item-label { font-size: 1rem; font-weight: 600; letter-spacing: -0.008rem; }
    .item-desc  { font-size: 0.875rem; color: var(--text-secondary); letter-spacing: -0.007rem; margin-top: 0.125rem; }
    .arrow { color: var(--text-secondary); }
  </style>
</head>
<body>
<div class="wrap">
  <p class="title">K Auction 회원가입 핸드오프</p>
  <p class="sub">케이옥션 회원가입 플로우 UI 핸드오프 문서입니다.</p>
  <div class="list">
    <a class="item" href="step1.html">
      <div class="item-left">
        <div class="item-num">1</div>
        <div>
          <div class="item-label">Step 1 — 인증</div>
          <div class="item-desc">회원 유형 선택, 휴대폰/이메일 인증</div>
        </div>
      </div>
      <svg class="arrow" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M7 4l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a class="item" href="step2.html">
      <div class="item-left">
        <div class="item-num">2</div>
        <div>
          <div class="item-label">Step 2 — 정보 입력</div>
          <div class="item-desc">계정 정보, 인적 사항, 주소 입력</div>
        </div>
      </div>
      <svg class="arrow" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M7 4l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a class="item" href="step3.html">
      <div class="item-left">
        <div class="item-num">3</div>
        <div>
          <div class="item-label">Step 3 — 증빙자료</div>
          <div class="item-desc">사업자 증빙자료 첨부 (사업자 회원)</div>
        </div>
      </div>
      <svg class="arrow" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M7 4l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a class="item" href="complete.html">
      <div class="item-left">
        <div class="item-num done">✓</div>
        <div>
          <div class="item-label">Complete — 가입 완료</div>
          <div class="item-desc">추가 정보 입력, 경매 안내</div>
        </div>
      </div>
      <svg class="arrow" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M7 4l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>
</div>
</body>
</html>
